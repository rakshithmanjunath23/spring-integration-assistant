version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: assistant_db
      POSTGRES_USER: assistant
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assistant -d assistant_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      GROK_API_KEY: ${GROK_API_KEY}
      GROK_API_URL: https://api.x.ai/v1
      GROK_MODEL: grok-3-latest
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/assistant_db
      SPRING_DATASOURCE_USERNAME: assistant
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_PROFILES_ACTIVE: prod
      IX_CONFIG_CSV_PATH: /app/IXconfiguration.txt
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    environment:
      REACT_APP_API_URL: http://backend:8080
    depends_on:
      - backend

volumes:
  postgres_data:
